<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="High-fidelity interactive preview of the RBI Swimming Pool website design. View layout options, responsive widths, and high-resolution details.">
    <title>RBI Swimming Pool - Interactive Design Preview</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Google Fonts for premium typography in UI elements -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="theme-dark">
    <!-- Main design preview container -->
    <main id="preview-wrapper" class="view-fit">
        <div class="design-preview" role="img" aria-label="RBI Swimming Pool Design Preview"></div>
    </main>
    <!-- Simple, unobtrusive scroll-to-top indicator -->
    <button id="scroll-top-btn" class="scroll-top" title="Scroll to Top" aria-label="Scroll to top">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 15.75l7.5-7.5 7.5 7.5" />
        </svg>
    </button>

    <script src="script.js"></script>
</body>
</html>
